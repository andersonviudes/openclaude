name: Sync upstream

on:
  schedule:
    - cron: '* 1 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync main with upstream/main
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config --global user.name  "gitea-actions[bot]"
          git config --global user.email "gitea-actions[bot]@users.noreply.gitea.com"

          # Clone do próprio repositório no Gitea via host externo
          # (o alias interno "gitea" não resolve de dentro do runner)
          GITEA_HOST="git.house.server:3000"
          AUTH_URL="http://gitea-actions:${GITEA_TOKEN}@${GITEA_HOST}/${GITHUB_REPOSITORY}.git"
          git clone --branch main "$AUTH_URL" repo
          cd repo

          # Fetch do repositório original
          git remote add upstream https://github.com/Gitlawb/openclaude.git
          git fetch upstream main --tags

          # Decide a estratégia de sync
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "origin/main já contém upstream/main — nada a fazer."
            exit 0
          fi

          if git merge-base --is-ancestor HEAD upstream/main; then
            echo "Fast-forward para upstream/main."
            git merge --ff-only upstream/main
          else
            echo "Histórias divergiram — criando merge commit."
            git merge --no-ff upstream/main \
              -m "chore: sync main with upstream/main"
          fi

          git push origin main --follow-tags

      - name: Rebase personal onto main
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Reuse the clone from the previous step.
          cd repo

          # rerere lets known conflict resolutions auto-replay between runs.
          # The clone is fresh each run, so the cache builds up only within a
          # single rebase; cross-run persistence would need a Gitea Actions
          # cache artifact — left as a follow-up.
          git config rerere.enabled true
          git config rerere.autoupdate true

          # Pull the current state of `personal` from origin.
          git fetch origin personal || {
            echo "origin/personal not found — nothing to rebase."
            exit 0
          }

          git checkout -B personal origin/personal

          OLD=$(git rev-parse HEAD)

          # `commit.gpgsign=false` because gpg-agent has no TTY in CI and
          # would block pinentry. Rebased commits land unsigned — acceptable
          # for the sync bot; signed commits should originate from devs.
          if git -c commit.gpgsign=false rebase origin/main; then
            NEW=$(git rev-parse HEAD)
            if [ "$OLD" = "$NEW" ]; then
              echo "personal already up to date with main."
              exit 0
            fi
            git push --force-with-lease origin personal
            echo "personal rebased: ${OLD:0:7} -> ${NEW:0:7}"
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            git rebase --abort
            # Soft-fail: main sync already succeeded above; don't redo the
            # whole job. Surface as a workflow warning instead.
            echo "::warning::personal rebase onto main failed; unresolved conflicts in: ${CONFLICTS:-<unknown>}"
            exit 0
          fi
