name: Sync upstream

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync main with upstream/main
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config --global user.name  "gitea-actions[bot]"
          git config --global user.email "gitea-actions[bot]@users.noreply.gitea.com"

          # Clone do próprio repositório no Gitea via host externo
          # (o alias interno "gitea" não resolve de dentro do runner)
          GITEA_HOST="git.house.server:3000"
          AUTH_URL="http://gitea-actions:${GITEA_TOKEN}@${GITEA_HOST}/${GITHUB_REPOSITORY}.git"
          git clone --branch main "$AUTH_URL" repo
          cd repo

          # Fetch do repositório original
          git remote add upstream https://github.com/Gitlawb/openclaude.git
          git fetch upstream main --tags

          # Decide a estratégia de sync
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "origin/main já contém upstream/main — nada a fazer."
            exit 0
          fi

          if git merge-base --is-ancestor HEAD upstream/main; then
            echo "Fast-forward para upstream/main."
            git merge --ff-only upstream/main
          else
            echo "Histórias divergiram — criando merge commit."
            git merge --no-ff upstream/main \
              -m "chore: sync main with upstream/main"
          fi

          git push origin main --follow-tags
